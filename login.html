<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập — Task Manager</title>
    <meta name="description" content="Đăng nhập vào hệ thống Quản lý task nguyên liệu NEVO"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #C62828;
            --primary-dark: #8B0000;
            --primary-light: #FF5F52;
            --bg-page: #F0F2F5;
            --bg-card: #FFFFFF;
            --bg-input: #E8EBF0;
            --bg-input-focus: #DDE1EA;
            --text-dark: #131b2e;
            --text-medium: #4B5563;
            --text-light: #9CA3AF;
            --text-link: #C62828;
            --shadow-card: 0 8px 40px -8px rgba(19, 27, 46, 0.14), 0 2px 12px -2px rgba(19, 27, 46, 0.08);
            --radius-card: 20px;
            --radius-input: 10px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            background-image: radial-gradient(circle, rgba(19,27,46,0.06) 1px, transparent 1px);
            background-size: 28px 28px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* ===== MAIN CONTAINER ===== */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ===== HEADER ===== */
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeSlideDown 0.6s ease-out both;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: #fff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 8px 24px -4px rgba(15, 23, 46, 0.12);
            position: relative;
            padding: 8px;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand-name {
            font-family: 'Manrope', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .brand-sub {
            display: inline-block;
            margin-top: 0.35rem;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .brand-tagline {
            margin-top: 0.6rem;
            font-size: 0.82rem;
            color: var(--text-light);
            font-weight: 400;
            line-height: 1.5;
        }

        /* ===== CARD ===== */
        .login-card {
            width: 100%;
            background: var(--bg-card);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            padding: 2.25rem 2rem;
            animation: fadeSlideUp 0.6s ease-out 0.1s both;
        }

        .card-title {
            font-family: 'Manrope', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.25rem;
        }

        .card-subtitle {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 1.75rem;
        }

        /* ===== FORM ELEMENTS ===== */
        .form-group {
            margin-bottom: 1.15rem;
        }

        .form-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.45rem;
        }

        label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-medium);
        }

        .forgot-link {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-link);
            text-decoration: none;
            transition: var(--transition);
        }

        .forgot-link:hover {
            opacity: 0.75;
            text-decoration: underline;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon-left {
            position: absolute;
            left: 13px;
            color: var(--text-light);
            font-size: 18px;
            font-variation-settings: 'FILL' 0, 'wght' 400;
            pointer-events: none;
            transition: var(--transition);
        }

        .input-icon-right {
            position: absolute;
            right: 13px;
            color: var(--text-light);
            font-size: 18px;
            font-variation-settings: 'FILL' 0, 'wght' 400;
            cursor: pointer;
            transition: var(--transition);
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .input-icon-right:hover {
            color: var(--text-medium);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.78rem 2.8rem 0.78rem 2.75rem;
            background: var(--bg-input);
            border: 2px solid transparent;
            border-radius: var(--radius-input);
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            font-weight: 500;
            transition: var(--transition);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--text-light);
            font-weight: 400;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            background: var(--bg-input-focus);
            border-color: rgba(198, 40, 40, 0.35);
            box-shadow: 0 0 0 4px rgba(198, 40, 40, 0.08);
        }

        input[type="text"]:focus ~ .input-icon-left,
        input[type="password"]:focus ~ .input-icon-left {
            color: var(--primary);
        }

        /* Input when focused state for sibling selector */
        .input-wrapper:focus-within .input-icon-left {
            color: var(--primary);
        }

        /* ===== ERROR MESSAGE ===== */
        .error-message {
            display: none;
            align-items: center;
            gap: 0.4rem;
            padding: 0.7rem 1rem;
            background: rgba(198, 40, 40, 0.08);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 8px;
            margin-bottom: 1.15rem;
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 500;
            animation: shake 0.4s ease;
        }

        .error-message.show {
            display: flex;
        }

        .error-message .material-symbols-outlined {
            font-size: 16px;
            font-variation-settings: 'FILL' 1, 'wght' 500;
            flex-shrink: 0;
        }

        /* ===== SUBMIT BUTTON ===== */
        .btn-login {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            font-family: 'Manrope', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            border-radius: var(--radius-input);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            letter-spacing: 0.01em;
            transition: var(--transition);
            box-shadow: 0 4px 20px -4px rgba(198, 40, 40, 0.5);
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px -4px rgba(198, 40, 40, 0.55);
        }

        .btn-login:hover::before {
            opacity: 1;
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 3px 12px -3px rgba(198, 40, 40, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .material-symbols-outlined {
            font-size: 18px;
            font-variation-settings: 'FILL' 0, 'wght' 600;
        }

        /* ===== LOADING SPINNER ===== */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .btn-icon { display: none; }
        .btn-login.loading .spinner { display: block; }

        /* ===== FOOTER ===== */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-light);
            animation: fadeSlideUp 0.6s ease-out 0.25s both;
        }

        .login-footer a {
            color: var(--text-link);
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
        }

        .login-footer a:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        /* ===== DIVIDER ===== */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #E5E7EB, transparent);
            margin: 1.5rem 0;
        }

        /* Valid input indicator */
        .input-wrapper.valid input {
            border-color: rgba(0, 160, 100, 0.3);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-card { padding: 1.75rem 1.5rem; }
            .brand-name { font-size: 1.5rem; }
        }

        /* ===== INPUT SHAKE ON ERROR ===== */
        .input-shake {
            animation: shake 0.4s ease;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <!-- HEADER -->
    <div class="login-header">
        <div class="logo-icon">
            <img src="https://bizweb.dktcdn.net/100/598/325/themes/1047287/assets/footers2_one_logo.png?1775450132549" alt="Task Manager Logo"/>
        </div>
        <h1 class="brand-name">Task Manager</h1>
        <span class="brand-sub">Hệ thống Quản lý</span>
        <p class="brand-tagline">Đăng nhập để vào trung tâm điều hành Task Manager</p>
    </div>

    <!-- CARD -->
    <div class="login-card">
        <div class="card-title">Chào mừng trở lại 👋</div>
        <div class="card-subtitle">Vui lòng đăng nhập để tiếp tục</div>

        <!-- Error Message -->
        <div id="errorMsg" class="error-message">
            <span class="material-symbols-outlined">error</span>
            <span id="errorText">Mã nhân viên hoặc mật khẩu không đúng.</span>
        </div>

        <form id="loginForm" onsubmit="return false;" novalidate>
            <!-- Employee ID -->
            <div class="form-group">
                <div class="form-label-row">
                    <label for="empId">Mã nhân viên</label>
                </div>
                <div class="input-wrapper" id="empIdWrapper">
                    <input
                        type="text"
                        id="empId"
                        name="empId"
                        placeholder="VD: EMP-1024"
                        autocomplete="username"
                        spellcheck="false"
                    />
                    <span class="material-symbols-outlined input-icon-left">badge</span>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <div class="form-label-row">
                    <label for="password">Mật khẩu</label>
                    <a href="#" class="forgot-link" onclick="return false;">Quên mật khẩu?</a>
                </div>
                <div class="input-wrapper" id="passwordWrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                    />
                    <span class="material-symbols-outlined input-icon-left">lock</span>
                    <button type="button" class="input-icon-right" id="togglePass" aria-label="Hiện/Ẩn mật khẩu">
                        <span class="material-symbols-outlined" id="eyeIcon">visibility</span>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-login" id="loginBtn">
                <span class="btn-text">Đăng nhập</span>
                <span class="material-symbols-outlined btn-icon">login</span>
                <div class="spinner"></div>
            </button>
        </form>
    </div>

    <!-- FOOTER -->
    <div class="login-footer">
        © 2026 Hệ thống được phát triển bởi Bành Đại Dũng - Creative<br/>
        Gặp sự cố? <a href="#" onclick="return false;">Hỗ trợ kỹ thuật</a>
    </div>
</div>

      storageBucket: "nevotask.firebasestorage.app",
      messagingSenderId: "1031918825498",

    const DEFAULT_USERS = [
        { empId: 'admin',    name: 'Admin Hệ thống', password: 'admin123', email: 'admin@nevosport.vn',   dept: 'IT',            role: 'admin',   status: 'active',   permissions: ['view','create','edit','delete','approve','report','admin'],  createdAt: '2024-01-01' },
        { empId: 'demo',     name: 'Người dùng Demo', password: '123456',   email: 'demo@nevosport.vn',   dept: 'Kinh doanh',    role: 'user',    status: 'active',   permissions: ['view','create'],                                              createdAt: '2024-01-01' },
        { empId: 'EMP-1024', name: 'Nguyễn Văn Lam', password: '1234',     email: 'lam.nv@nevosport.vn',  dept: 'Logistics',     role: 'manager', status: 'active',   permissions: ['view','create','edit','approve','report'],                    createdAt: '2024-03-15' },
        { empId: 'nevo',     name: 'Nevo Sport',     password: 'nevo',     email: 'nevo@nevosport.vn',    dept: 'Ban Giám Đốc',  role: 'viewer',  status: 'active',   permissions: ['view','report'],                                              createdAt: '2024-04-10' },
    ];

    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
    window.fsDoc = doc;
    window.fsGetDoc = getDoc;
    window.fsSetDoc = setDoc;
    window.fsCollection = collection;
    window.fsGetDocs = getDocs;

    // Tự động nạp user mặc định nếu Cloud trống
    async function initDefaultUsers() {
        try {
            const q = window.fsCollection(window.db, "users");
            const snap = await window.fsGetDocs(q);
            if (snap.empty) {
                console.log("Khởi tạo dữ liệu người dùng mặc định...");
                for (const u of DEFAULT_USERS) {
                    await window.fsSetDoc(window.fsDoc(window.db, "users", u.empId), u);
                }
            }
        } catch (e) {
            console.error("Lỗi khởi tạo:", e);
        }
    }
    initDefaultUsers();
    console.log("Firebase initialized in login");
</script>

<!-- ====== UI LOGIC ====== -->
<script>
    // ===== TOGGLE PASSWORD =====
    function togglePassword() {
        const pwdInput = document.getElementById('password');
        const eyeIcon  = document.getElementById('eyeIcon');
        if (pwdInput.type === 'password') {
            pwdInput.type = 'text';
            eyeIcon.textContent = 'visibility_off';
        } else {
            pwdInput.type = 'password';
            eyeIcon.textContent = 'visibility';
        }
    }

    // ===== SHOW ERROR =====
    function showError(message) {
        const box  = document.getElementById('errorMsg');
        const text = document.getElementById('errorText');
        text.textContent = message;
        box.classList.add('show');

        ['empIdWrapper', 'passwordWrapper'].forEach(id => {
            const el = document.getElementById(id);
            el.classList.remove('input-shake');
            void el.offsetWidth;
            el.classList.add('input-shake');
            setTimeout(() => el.classList.remove('input-shake'), 400);
        });
    }

    function hideError() {
        document.getElementById('errorMsg').classList.remove('show');
    }

    // ===== LOGIN HANDLER =====
    async function handleLogin(e) {
        if (e) e.preventDefault();
        hideError();

        const empId    = document.getElementById('empId').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('loginBtn');

        if (!empId) {
            showError('Vui lòng nhập mã nhân viên.');
            document.getElementById('empId').focus();
            return;
        }
        if (!password) {
            showError('Vui lòng nhập mật khẩu.');
            document.getElementById('password').focus();
            return;
        }

        btn.classList.add('loading');
        btn.disabled = true;

        // Check if Firebase is ready
        if (!window.db) {
            // Wait a bit
            await new Promise(r => setTimeout(r, 500));
            if (!window.db) {
                btn.classList.remove('loading');
                btn.disabled = false;
                showError('Hệ thống đang khởi động, vui lòng thử lại sau giây lát.');
                return;
            }
        }

        try {
            const userRef = window.fsDoc(window.db, "users", empId);
            const userDoc = await window.fsGetDoc(userRef);

            if (userDoc.exists()) {
                const userData = userDoc.data();
                
                if (userData.password === password) {
                    if (userData.status === 'inactive') {
                        showError('Tài khoản đã bị khóa. Vui lòng liên hệ quản trị viên.');
                    } else {
                        sessionStorage.setItem('nevo_logged_in', 'true');
                        sessionStorage.setItem('nevo_user', userData.name || empId);
                        sessionStorage.setItem('nevo_role', userData.role || 'user');
                        sessionStorage.setItem('nevo_dept', userData.dept || '');
                        sessionStorage.setItem('nevo_empId', userData.empId || empId);
                        sessionStorage.setItem('nevo_email', userData.email || '');
                        sessionStorage.setItem('nevo_phone', userData.phone || '');

                        btn.innerHTML = `
                            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1,'wght' 600;font-size:20px;">check_circle</span>
                            <span style="font-family:'Manrope',sans-serif;font-weight:700;">Thành công!</span>
                        `;
                        btn.style.background = 'linear-gradient(135deg, #16a34a, #15803d)';
                        btn.style.boxShadow  = '0 8px 28px -4px rgba(22,163,74,0.5)';

                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 800);
                        return;
                    }
                } else {
                    showError('Mã nhân viên hoặc mật khẩu không đúng.');
                }
            } else {
                showError('Mã nhân viên hoặc mật khẩu không đúng.');
            }
        } catch (error) {
            console.error("Login error:", error);
            showError('Lỗi kết nối máy chủ. Vui lòng thử lại sau.');
        } finally {
            if (sessionStorage.getItem('nevo_logged_in') !== 'true') {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
    }

    // ===== EVENT LISTENERS =====
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
        document.getElementById('togglePass').addEventListener('click', togglePassword);

        ['empId', 'password'].forEach(id => {
            document.getElementById(id).addEventListener('input', hideError);
            document.getElementById(id).addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && id === 'empId') {
                    e.preventDefault();
                    document.getElementById('password').focus();
                }
            });
        });
    });

    if (sessionStorage.getItem('nevo_logged_in') === 'true') {
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
